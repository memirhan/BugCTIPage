<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="50" />
    </clipPath>
  </defs>
  <!-- Scale up slightly to crop out any white borders, preserveAspectRatio slice -->
  <image width="100" height="100" preserveAspectRatio="xMidYMid slice" href="/bugcti-logo.png" clip-path="url(#circleClip)" />
</svg>