<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>BugCTI — AI-Powered Code Security</title>
    <meta name="description" content="BugCTI scans every GitHub Pull Request for security vulnerabilities, performance bottlenecks, and logic errors in under 10 seconds." />
    <meta name="keywords" content="code security, pull request review, AI code review, GitHub security, vulnerability detection, SAST, static analysis, DevSecOps, secure code, BugCTI" />
    <meta name="author" content="BugCTI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://bugcti.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bugcti.com/" />
    <meta property="og:title" content="BugCTI — AI-Powered Code Security" />
    <meta property="og:description" content="Automatically scan every PR for security vulnerabilities, performance issues, and logic errors in under 10 seconds. Powered by Gemini 2.5 Pro." />
    <meta property="og:image" content="https://bugcti.com/dashboard.webp" />
    <meta property="og:site_name" content="BugCTI" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://bugcti.com/" />
    <meta name="twitter:title" content="BugCTI — AI-Powered Code Security" />
    <meta name="twitter:description" content="Automatically scan every PR for security vulnerabilities, performance issues, and logic errors in under 10 seconds." />
    <meta name="twitter:image" content="https://bugcti.com/dashboard.webp" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/webp" href="/bugcti-logo.webp" />
    <link rel="apple-touch-icon" href="/bugcti-logo.webp" />

    <!-- Theme -->
    <meta name="theme-color" content="#010409" />
    <meta name="color-scheme" content="dark" />

    <!-- Structured Data — SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "BugCTI",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "url": "https://bugcti.com",
      "description": "AI-powered security layer that catches vulnerabilities, performance bottlenecks, and logic errors in GitHub Pull Requests before they reach production.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Early Access — Free"
      },
      "featureList": [
        "Automated PR security scanning",
        "SQL injection and OWASP vulnerability detection",
        "Performance bottleneck analysis",
        "Logic error detection",
        "Auto-generated fix suggestions",
        "GitHub integration"
      ],
      "screenshot": "https://bugcti.com/dashboard.webp",
      "provider": {
        "@type": "Organization",
        "name": "BugCTI",
        "email": "emirhan@bugcti.com"
      }
    }
    </script>

    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BugCTI",
      "url": "https://bugcti.com",
      "logo": "https://bugcti.com/bugcti-logo.webp",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "emirhan@bugcti.com",
        "contactType": "customer support"
      }
    }
    </script>

    <!-- Structured Data — WebSite (sitelinks searchbox eligible) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BugCTI",
      "url": "https://bugcti.com"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
